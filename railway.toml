[build]
builder = "NIXPACKS"

[[services]]
name = "backend"
source = "backend"
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"

[services.envVars]
DATABASE_URL = { fromSecret = "DATABASE_URL" }
DIRECT_URL = { fromSecret = "DIRECT_URL" }
JWT_SECRET = { fromSecret = "JWT_SECRET" }
FRONTEND_URL = { fromSecret = "FRONTEND_URL" }
ENVIRONMENT = "production"

[[services]]
name = "frontend"
source = "frontend"
buildCommand = "npm run build"
startCommand = "npm start"

[services.envVars]
NEXT_PUBLIC_API_URL = { fromSecret = "NEXT_PUBLIC_API_URL" }
